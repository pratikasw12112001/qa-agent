name: QA Run

on:
  repository_dispatch:
    types: [qa-run]
  workflow_dispatch:
    inputs:
      figmaUrl:
        description: "Figma file URL"
        required: true
      liveUrl:
        description: "Live site URL"
        required: true
      runId:
        description: "Run ID (leave blank to auto-generate)"
        required: false

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agent/package.json

      - name: Install agent dependencies
        working-directory: agent
        run: npm install

      - name: Install Playwright Chromium
        working-directory: agent
        run: npx playwright install chromium --with-deps

      - name: Write progress – queued
        env:
          RUN_ID: ${{ github.event.client_payload.runId || github.event.inputs.runId || 'manual' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin gh-pages
          git checkout gh-pages

          mkdir -p progress
          echo '{"status":"running","queuedAt":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > progress/${RUN_ID}.json

          git add progress/${RUN_ID}.json
          git commit -m "progress: ${RUN_ID} running" || true
          git push origin gh-pages

          git checkout main

      - name: Decode PRD PDF if provided
        env:
          PRD_BASE64: ${{ github.event.client_payload.prdBase64 || '' }}
        run: |
          if [ -n "$PRD_BASE64" ]; then
            mkdir -p agent/uploads
            echo "$PRD_BASE64" | base64 -d > agent/uploads/prd.pdf
            echo "PRD_PDF_PATH=./uploads/prd.pdf" >> $GITHUB_ENV
          fi

      - name: Run QA Agent
        working-directory: agent
        env:
          FIGMA_TOKEN:    ${{ secrets.FIGMA_TOKEN }}
          LOGIN_EMAIL:    ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIGMA_FILE_URL: ${{ github.event.client_payload.figmaUrl || github.event.inputs.figmaUrl }}
          LIVE_URL:       ${{ github.event.client_payload.liveUrl  || github.event.inputs.liveUrl }}
          PRD_PDF_PATH:   ${{ env.PRD_PDF_PATH || '' }}
          RUN_ID:         ${{ github.event.client_payload.runId    || github.event.inputs.runId || '' }}
          LOGIN_URL:      ${{ vars.LOGIN_URL }}
          SESSION_PATH:   ./sessions/session.json
          OUT_DIR:        ./reports
          CI:             "true"
        run: node agent.mjs

      - name: Upload report to gh-pages
        if: always()
        env:
          RUN_ID: ${{ github.event.client_payload.runId || github.event.inputs.runId || 'manual' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin gh-pages
          git checkout gh-pages

          mkdir -p reports progress

          # Copy report HTML if it exists
          if [ -f "agent/reports/report.html" ]; then
            cp agent/reports/report.html reports/${RUN_ID}.html
          fi

          # Write final progress JSON
          if [ -f "agent/reports/report.html" ]; then
            STATUS="done"
          else
            STATUS="error"
          fi
          echo '{"status":"'${STATUS}'","completedAt":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","reportUrl":"https://pratikasw12112001.github.io/qa-agent/reports/'${RUN_ID}'.html"}' > progress/${RUN_ID}.json

          git add reports/${RUN_ID}.html progress/${RUN_ID}.json 2>/dev/null || true
          git add progress/${RUN_ID}.json
          git commit -m "report: ${RUN_ID} ${STATUS}" || true
          git push origin gh-pages

          git checkout main

      - name: Upload artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.event.client_payload.runId || 'manual' }}
          path: agent/reports/
          retention-days: 30

      - name: Post run summary
        if: always()
        run: |
          RUN_ID="${{ github.event.client_payload.runId || 'manual' }}"
          echo "## QA Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${RUN_ID}" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** https://pratikasw12112001.github.io/qa-agent/reports/${RUN_ID}.html" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** ${{ github.event.client_payload.liveUrl || github.event.inputs.liveUrl }}" >> $GITHUB_STEP_SUMMARY
