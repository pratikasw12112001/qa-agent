name: QA Run

on:
  repository_dispatch:
    types: [qa-run]
  workflow_dispatch:
    inputs:
      figmaUrl:
        description: "Figma file URL"
        required: true
      liveUrl:
        description: "Live site URL"
        required: true
      runId:
        description: "Run ID (leave blank to auto-generate)"
        required: false

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent dependencies
        working-directory: agent
        run: npm install

      - name: Install Playwright Chromium
        working-directory: agent
        run: npx playwright install chromium --with-deps

      - name: Write progress — running
        env:
          RUN_ID: ${{ github.event.client_payload.runId || github.event.inputs.runId || 'manual' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          for attempt in 1 2 3; do
            git fetch origin gh-pages
            git checkout gh-pages
            git reset --hard origin/gh-pages
            mkdir -p progress
            echo "{\"status\":\"running\",\"queuedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > progress/${RUN_ID}.json
            git add progress/${RUN_ID}.json
            git commit -m "progress: ${RUN_ID} running" || true
            git push origin gh-pages && break || echo "Push attempt $attempt failed, retrying in ${attempt}s..." && sleep $attempt
          done
          git checkout main

      - name: Download PRD PDF (if provided)
        env:
          PRD_URL: ${{ github.event.client_payload.prdUrl || '' }}
        run: |
          if [ -n "$PRD_URL" ]; then
            mkdir -p agent/uploads
            curl -sL --retry 5 --retry-delay 10 --retry-connrefused "$PRD_URL" -o agent/uploads/prd.pdf
            if [ -s agent/uploads/prd.pdf ]; then
              echo "PRD_PDF_PATH=./uploads/prd.pdf" >> $GITHUB_ENV
              echo "  PRD downloaded ($(wc -c < agent/uploads/prd.pdf) bytes)"
            else
              echo "  WARN: PRD download failed — continuing without PRD"
            fi
          fi

      - name: Run QA agent
        working-directory: agent
        env:
          FIGMA_TOKEN:    ${{ secrets.FIGMA_TOKEN }}
          LOGIN_EMAIL:    ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIGMA_FILE_URL: ${{ github.event.client_payload.figmaUrl || github.event.inputs.figmaUrl }}
          LIVE_URL:       ${{ github.event.client_payload.liveUrl || github.event.inputs.liveUrl }}
          PRD_PDF_PATH:   ${{ env.PRD_PDF_PATH || '' }}
          RUN_ID:         ${{ github.event.client_payload.runId || github.event.inputs.runId || 'manual' }}
          SESSION_PATH:   ./sessions/session.json
          OUT_DIR:        ./reports
          GH_CACHE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:    pratikasw12112001/qa-agent
          CI: "true"
        run: node agent.mjs

      - name: Upload report + final progress
        if: always()
        env:
          RUN_ID: ${{ github.event.client_payload.runId || github.event.inputs.runId || 'manual' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAGES_BASE: ${{ vars.GH_PAGES_BASE || 'https://pratikasw12112001.github.io/qa-agent' }}
        run: |
          REPORT_SRC="$GITHUB_WORKSPACE/agent/reports/report.html"

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          if [ -f "$REPORT_SRC" ]; then
            STATUS="done"
          else
            STATUS="error"
          fi

          # Retry loop: always reset to latest remote before writing to avoid non-fast-forward
          for attempt in 1 2 3 4 5; do
            git fetch origin gh-pages
            git checkout gh-pages
            git reset --hard origin/gh-pages

            mkdir -p reports progress

            if [ "$STATUS" = "done" ]; then
              cp "$REPORT_SRC" reports/${RUN_ID}.html
            fi

            echo "{\"status\":\"${STATUS}\",\"completedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"reportUrl\":\"${GH_PAGES_BASE}/reports/${RUN_ID}.html\"}" > progress/${RUN_ID}.json

            git add reports/${RUN_ID}.html 2>/dev/null || true
            git add progress/${RUN_ID}.json
            git commit -m "report: ${RUN_ID} ${STATUS}" || true
            git push origin gh-pages && break || echo "Push attempt $attempt failed, retrying in ${attempt}s..." && sleep $attempt
          done
          git checkout main

      - name: Upload artifact backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.event.client_payload.runId || 'manual' }}
          path: agent/reports/
          retention-days: 30

      - name: Step summary
        if: always()
        run: |
          RUN_ID="${{ github.event.client_payload.runId || 'manual' }}"
          echo "## QA Run" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${RUN_ID}" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** https://pratikasw12112001.github.io/qa-agent/reports/${RUN_ID}.html" >> $GITHUB_STEP_SUMMARY
